<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Dashboard | WINC Taro (Week 05)</title>
    <link rel="stylesheet" href="style.css">
    <script src="main.js" defer></script>
</head>
<body>
    <div class="dashboard-container">
        <!-- サイドバー -->
        <aside class="sidebar">
            <header>
                <div class="avatar" id="avatar"></div>
                <h1 id="user-name">Loading...</h1>
                <p id="user-role">Role</p>
            </header>
            <nav>
                <ul class="sns-links">
                    <li><a href="#">Twitter</a></li>
                    <li><a href="#">GitHub</a></li>
                </ul>
            </nav>
        </aside>

        <!-- メインコンテンツ -->
        <main class="main-content">
            <!-- [Week 01-04] からの継承セクション -->
            <section id="about">
                <h2>About Me</h2>
                <p id="about-text">JavaScriptでここを書き換えます。</p>
            </section>

            <section id="skills">
                <h2>Skills</h2>
                <div class="skills-grid" id="skills-list">
                    <!-- [Week 05] JSで項目を追加 -->
                </div>
            </section>

            <section id="hobbies">
                <h2>Hobbies</h2>
                <div class="hobbies-flex">
                    <article class="hobby-card">
                        <h3>サウナ</h3>
                        <p>週末はホームサウナでととのっています。</p>
                    </article>
                    <article class="hobby-card">
                        <h3>読書</h3>
                        <p>技術書から小説まで幅広く読みます。</p>
                    </article>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
