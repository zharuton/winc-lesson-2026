<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | WINC Taro (Layout)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- [Week 01-02] カード形式から、[Week 03] でダッシュボード形式（2カラム）へ進化 -->
    <div class="dashboard-container">
        
        <!-- [Week 03 新規追加] サイドバー領域 -->
        <aside class="sidebar">
            <header>
                <div class="avatar"></div>
                <h1>WINC 太郎</h1>
                <p>Front-end Learner</p>
            </header>
            <nav>
                <ul class="sns-links">
                    <li><a href="#">Twitter</a></li>
                    <li><a href="#">GitHub</a></li>
                </ul>
            </nav>
        </aside>

        <!-- メインコンテンツ領域 -->
        <main class="main-content">
            <section id="about">
                <h2>About Me</h2>
                <p>こんにちは！WINC 太郎です。大学で情報の勉強をしながら、Web制作の奥深さにハマっています。最近はReactに興味があります。</p>
            </section>

            <!-- [Week 03 新規追加] CSS Grid を使用したスキルグリッド -->
            <section id="skills">
                <h2>Skills</h2>
                <div class="skills-grid">
                    <div class="skill-item">HTML</div>
                    <div class="skill-item">CSS</div>
                    <div class="skill-item">JavaScript</div>
                    <div class="skill-item">Python</div>
                </div>
            </section>

            <!-- [Week 03 新規追加] Flexbox を使用した横並びカード -->
            <section id="hobbies">
                <h2>Hobbies</h2>
                <div class="hobbies-flex">
                    <article class="hobby-card">
                        <h3>サウナ</h3>
                        <p>週末はホームサウナでととのっています。</p>
                    </article>
                    <article class="hobby-card">
                        <h3>読書</h3>
                        <p>技術書から小説まで幅広く読みます。</p>
                    </article>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
